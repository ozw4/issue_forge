services:
  issue_forge:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
        NO_PROXY: ${NO_PROXY-}
        USERNAME: devuser
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    environment:
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
      NO_PROXY: ${NO_PROXY-}
    volumes:
      - type: bind
        source: ..
        target: /workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    init: true
